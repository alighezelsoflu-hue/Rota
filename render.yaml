services:
  - type: web
    name: rota-api
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads

  - type: static
    name: rota-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
